services:
  telegram-bot-api:
    image: aiogram/telegram-bot-api:latest
    restart: always
    environment:
      TELEGRAM_API_ID: "${TELEGRAM_API_ID}"
      TELEGRAM_API_HASH: "${TELEGRAM_API_HASH}"
    volumes:
      - tba-data:/var/lib/telegram-bot-api
    ports:
      - "127.0.0.1:8081:8081"

  socialfetch:
    build: .
    restart: always
    depends_on:
      - telegram-bot-api
    environment:
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN}"
      SOCIALFETCH__TELEGRAM_API_URL: "http://telegram-bot-api:8081/bot"
      SOCIALFETCH__PROXY_URL: "${SOCIALFETCH__PROXY_URL:-socks5h://warp:40000}"
    volumes:
      - downloads:/app/downloads
    ports:
      - "127.0.0.1:8080:8080"

  warp:
    image: monius/docker-wireproxy:latest
    restart: always
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=0
    environment:
      WARP_SLEEP: 2
    volumes:
      - warp-data:/var/lib/cloudflare-warp
    ports:
      - "127.0.0.1:40000:40000"

volumes:
  tba-data:
  downloads:
  warp-data:
